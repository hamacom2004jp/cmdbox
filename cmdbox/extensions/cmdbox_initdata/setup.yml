# setup_cmdbox.yml
# cmdbox セットアップファイルのサンプルです。
# `cmdbox -m cmdbox -c setup --setup_file setup_cmdbox.yml` で実行します。
#
# setups: セットアップ手順の配列です。上から順番に実行されます。
#   - name       : セットアップ手順の名前
#     description: セットアップ手順の説明文
#     exec       : 実行するコマンドのパラメータ
#       mode     : コマンドのモード (-m に相当)
#       cmd      : コマンド名 (-c に相当)
#       その他   : コマンドに渡す追加オプション (--option_name に相当)

setups:
  - name: "client_upload"
    description: "クライアント側の設定をアップロードします。"
    exec:
      mode: cmdbox
      cmd: initdata_install
      host: "f'{self.default_host}'"
      port: "f'{self.default_port}'"
      password: "f'{self.default_pass}'"
      svname: "f'{self.ver.__appid__}_setup'"
      svpath: "'/'"
      fwpath: "'/'"
      rjpath:
      scope: "'client'"
      overwrite: false
      client_data: "f'{self.default_data}'"
      initdata_path: "f'{cur_path / \".cmdbox_initdata\" / \"client\"}'"

  - name: "server_upload"
    description: "サーバー側の設定をアップロードします。"
    exec:
      mode: cmdbox
      cmd: initdata_install
      host: "f'{self.default_host}'"
      port: "f'{self.default_port}'"
      password: "f'{self.default_pass}'"
      svname: "f'{self.ver.__appid__}_setup'"
      svpath: "'/'"
      fwpath: "'/'"
      rjpath:
      scope: "'server'"
      overwrite: false
      initdata_path: "f'{cur_path / \".cmdbox_initdata\" / \"server\"}'"
