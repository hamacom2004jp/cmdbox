<!DOCTYPE html>
<html lang="ja" data-bs-theme="spaceship">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap">
    <!-- Agent CSS -->
    <link rel="stylesheet" href="assets/cmdbox/color_mode.css">
    <link rel="stylesheet" href="assets/agent/agent.css">
    <!-- Additional CSS libraries -->
    <link rel="stylesheet" href="assets/lightbox2/css/lightbox.min.css">
    <link rel="stylesheet" href="assets/tree-menu/css/tree-menu.css">
    <link rel="stylesheet" href="assets/split-pane/split-pane.css">
    <link rel="stylesheet" href="assets/highlight/styles/tokyo-night-dark.min.css">
    <link rel="stylesheet" href="assets/jquery-linedtextarea/jquery-linedtextarea.css">
</head>

<body>
<div class="layout-grid">
    <!-- NAVIGATION SIDEBAR -->
    <nav class="nav-sidebar" id="navSidebar" style="z-index:51;">
        <div class="nav-sidebar-header ps-2 pt-3 pb-3">
            <button id="btn_toggle_sidebar" class="btn btn-nav-toggle me-auto" title="Toggle sidebar" style="width:53px;border:none;">
                <i class="fas fa-bars fa-xl"></i>
            </button>
        </div>
        <div class="nav-sidebar-content">
            <button id="btn_histories" class="btn btn-nav-action" data-bs-toggle="modal" data-bs-target="#historyModal" title="Histories" style="border:none;">
                <i class="fas fa-history fa-2xl"></i>
                <span class="nav-label">Histories</span>
            </button>
            <button id="btn_filetrancefer" class="btn btn-nav-action" data-bs-toggle="modal" data-bs-target="#fileTranceferModal" title="Files" style="border:none;">
                <i class="fa-solid fa-folder-open fa-2xl"></i>
                <span class="nav-label">Files</span>
            </button>
            <button id="btn_memories" class="btn btn-nav-action" data-bs-toggle="modal" data-bs-target="#memoryModal" title="Memory" style="border:none;">
                <i class="fas fa-brain fa-2xl"></i>
                <span class="nav-label">MEMORY</span>
            </button>
            <button id="btn_config" class="btn btn-nav-action" data-bs-toggle="modal" data-bs-target="#agent_settings_modal" title="Config" style="border:none;">
                <i class="fas fa-cog fa-2xl"></i>
                <span class="nav-label">SETTINGS</span>
            </button>
        </div>
    </nav>
    <div class="split-pane fixed-left" style="display:flex;">
        <!-- LEFT PANEL: Console / Chat Interface -->
        <aside class="console-panel split-pane-component" style="z-index:52;">
            <div class="d-flex align-items-center console-header justify-content-between">
                <h5 class="d-inline-block m-0 glow-text-cyan system-font">
                    <span class="d-flex align-items-center">
                        <i class="fas fa-terminal me-2"></i>
                        <span id="display_runner_name" style="cursor: pointer;" title="Click to select runner">
                            Click Here
                        </span>
                    </span>
                </h5>
                <div class="d-none dropdown user_info" style="font-size: 0.8rem;">
                    <a href="#" class="d-block text-decoration-none dropdown-toggle show" data-bs-toggle="dropdown" aria-expanded="true">
                        <div class="d-inline-block me-1">
                            <svg width="24" height="24" viewBox="0 0 16 16" style="fill:var(--accent-cyan);vertical-align:inherit;">
                                <use href="#svg_signin_ico"></use>
                            </svg>
                        </div>
                        <div class="d-inline-block">
                            <span class="user_info_color">USER: <span class="username glow-text-magenta">UserName</span></span>
                            <br/>
                            <span class="user_info_color">STATUS: <span style="color:var(--accent-green)">ONLINE</span></span>
                        </div>
                    </a>
                    <ul class="dropdown-menu text-small shadow" style="position:absolute;inset:0px 0px auto auto;margin:0px;transform:translate(0px, 34px);" data-popper-placement="bottom-end">
                        <div class="user_info_note ps-3 pe-3"></div>
                        <li><hr class="dropdown-divider"></li>
                    </ul>
                </div>
            </div>

            <div class="chat-history" id="chatContainer">
                <div class="chat-container-header d-flex justify-content-end p-2" style="position:sticky;top:0;z-index:10;">
                    <button id="btn_new_chat" class="btn btn-nav-action" title="新しいチャットを始める" style="flex-shrink:0;border:none;">
                        <i class="fas fa-plus fa-2xl"></i>
                    </button>
                </div>
                <div id="messages"></div>
            </div>

            <div class="console-footer">
                <div class="input-group input-group-sf m-0">
                    <button id="btn_rec" class="btn btn-sf-icon" type="button" title="音声入力">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <textarea id="user_msg" class="form-control form-control-sf" placeholder="Command..." rows="1" style="border:0px;box-shadow:none;resize:none;field-sizing:content;"></textarea>
                    <button id="btn_say" class="btn btn-sf-icon" type="button" title="読み上げ切替">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <button id="btn_user_msg" class="btn btn-sf-icon" type="button">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </aside>

        <!-- 左右のスプリッター -->
        <div class="split-pane-divider split-pane-divider-left" style="z-index:52;"></div>

        <!-- AI Core and System Info Overlay -->
        <div class="system-location-container" style="position: absolute; top: 20px; right: 20px; text-align: right; z-index:52;" class="system-font text-white-50">
            <div id="current_time">--:--:--</div>
            <div>
                <a id="appid_version" class="dropdown-item" href="#" onclick="$(`#versions_modal`).modal(`show`);">cmdbox</a>
            </div>
        </div>
        <!-- Center AI Core (Default View) -->
        <div class="ai-core-container" id="aiCoreContainer">
            <div class="ai-core text-nowrap">
                <span id="logo_title" class="core-text">---</span>
            </div>
            <div class="ai-core-msg text-nowrap">
                <span id="display_runner_msg" class="glow-text-cyan system-font" style="font-size: 0.8rem; letter-spacing: 5px; white-space:nowrap;">
                    PLEASE SELECT A AGENT RUNNER
                </span>
            </div>
        </div>

        <!-- RIGHT PANEL: Visualizer / AI Monitor -->
        <main class="visualizer-panel split-pane-component split-pane-right-width">
        </main>
    </div>

    <!-- Runner選択モーダル -->
    <div id="runner_select_modal" class="modal fade" tabindex="-1" aria-hidden="true" style="z-index: 1090;">
        <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
            <div class="modal-content sf-modal doc-card" style="height:auto;">
                <div class="modal-header doc-header">
                    <h5 class="modal-title glow-text-cyan system-font">Select Runner</h5>
                    <button type="button" class="btn btn-sf-icon" data-bs-dismiss="modal" aria-label="Close">
                        <i class="fas fa-times fa-lg"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div id="runner_select_list" class="list-group">
                        <!-- Runner List Items will be injected here -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">CLOSE</button>
                </div>
            </div>
        </div>
    </div>

    <!-- メモリーモーダル -->
    <div id="memoryModal" class="modal fade" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
            <div class="modal-content sf-modal doc-card" style="height:auto;">
                <div class="modal-header doc-header">
                    <h5 class="modal-title glow-text-cyan system-font">
                        <i class="fas fa-brain fa-lg me-2"></i>
                        MEMORY
                    </h5>
                    <button type="button" class="btn btn-sf-icon" data-bs-dismiss="modal" aria-label="Close">
                        <i class="fas fa-times fa-lg"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="sf-param-grid mb-3">
                        <div class="sf-param-box">
                            <div class="text-white-50" style="font-size: 0.8rem;">REFERENCE_RANGE</div>
                            <div class="d-flex fs-5 system-font glow-text-cyan mt-2">
                                <div id="memory_range_start">---</div>
                                <div class="mx-1">~</div>
                                <div id="memory_range_end">---</div>
                            </div>
                        </div>
                        <div class="sf-param-box">
                            <div class="text-white-50" style="font-size: 0.8rem;">USAGE_RATIO</div>
                            <div class="fs-2 text-end system-font glow-text-magenta d-flex">
                                <div id="memory_performance">---</div>
                            </div>
                        </div>
                    </div>
                    <h6 class="glow-text-cyan system-font mt-4 mb-2">
                        <i class="fa-regular fa-address-card fa-lg mx-2"></i>USER_PROFILE_ANALYSIS
                    </h6>
                    <div class="p-3 border border-secondary bg-black bg-opacity-25" style="font-family: var(--font-body);">
                        <p id="memory_content" class="mb-2"><strong>Loading..</strong></p>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">CLOSE</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ヒストリーモーダル -->
    <div id="historyModal" class="modal fade" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
            <div class="modal-content sf-modal doc-card" style="height:auto;">
                <div class="modal-header doc-header">
                    <h5 class="modal-title glow-text-cyan system-font">
                        <i class="fas fa-history fa-lg me-2"></i>
                        HISTORIES
                    </h5>
                    <button type="button" class="btn btn-sf-icon" data-bs-dismiss="modal" aria-label="Close">
                        <i class="fas fa-times fa-lg"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div id="session_tab" class="tab-pane">
                        <ul class="sf-list-group">
                        </ul>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">CLOSE</button>
                </div>
            </div>
        </div>
    </div>


    <!-- versionsモーダル -->
    <div id="versions_modal" class="modal fade" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
            <form id="version_form" class="modal-content novalidate">
                <div class="modal-header doc-header">
                    <h5 class="modal-title glow-text-cyan system-font">Versions</h5>
                    <button type="button" class="btn btn-sf-icon btn_window_stack">
                        <i class="fa-regular fa-window-restore"></i>
                    </button>
                    <button type="button" class="btn btn-sf-icon btn_window">
                        <i class="fa-regular fa-window-maximize"></i>
                    </button>
                    <button type="button" class="btn btn-sf-icon" data-bs-dismiss="modal" aria-label="Close">
                        <i class="fas fa-times fa-lg"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <ul class="nav nav-tabs version-tabs" role="tablist"></ul>
                    <div class="tab-content version-content"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">CLOSE</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ローディングマスク -->
    <div id="loading" class="position-absolute top-0 start-0 w-100 h-100 d-none" style="background:rgba(0, 0, 0, 0.3);z-index:10000;">
        <div class="text-center position-absolute top-50 start-50 w-100 translate-middle">
            <div class="spinner-border text-light" role="status">
                <span class="sr-only"></span>
            </div>
            <div>
                <button type="button" class="btn btn-outline-danger mt-3 bbforce">Back by force</button>
            </div>
        </div>
    </div>
    <!-- フッター -->
    <footer class="copyright"></footer>
</div>
<script type="text/javascript">
    document.getElementById('loading').classList.remove('d-none');
</script>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Agent Logic Script -->
<script type="text/javascript" defer src="assets/encodingjs/encoding.js"></script>
<script type="text/javascript" defer src="assets/jquery/jquery.min.3.2.0.js"></script>
<script type="text/javascript" defer src="assets/jquery-ui/jquery-ui.min.js"></script>
<script type="text/javascript" defer src="assets/tree-menu/js/tree-menu.js"></script>
<script type="text/javascript" defer src="assets/lightbox2/js/lightbox.min.js"></script>
<script type="text/javascript" defer src="assets/split-pane/split-pane.js"></script>
<script type="text/javascript" defer src="assets/highlight/highlight.min.js"></script>
<script type="text/javascript" defer src="assets/jquery-linedtextarea/jquery-linedtextarea.js"></script>
<script type="text/javascript" defer src="assets/cmdbox/svgicon.js"></script>
<script type="text/javascript" defer src="assets/cmdbox/common.js"></script>
<script type="text/javascript" defer src="assets/cmdbox/filer_modal.js"></script>
<script type="text/javascript" defer src="assets/cmdbox/view_result.js"></script>
<script type="text/javascript" defer src="assets/agent/agent.js"></script>
<script type="text/javascript" defer src="assets/agent/agent_logo.js"></script>
<script type="text/javascript" defer src="assets/agent/agent_chat.js"></script>
<script type="text/javascript" defer src="assets/agent/agent_document.js"></script>
<script type="text/javascript" defer src="assets/agent/agent_history.js"></script>
<script type="text/javascript" defer src="assets/agent/agent_settings_agent.js"></script>
<script type="text/javascript" defer src="assets/agent/agent_settings_embed.js"></script>
<script type="text/javascript" defer src="assets/agent/agent_settings_extract.js"></script>
<script type="text/javascript" defer src="assets/agent/agent_settings_llm.js"></script>
<script type="text/javascript" defer src="assets/agent/agent_settings_mcpsv.js"></script>
<script type="text/javascript" defer src="assets/agent/agent_settings_memory.js"></script>
<script type="text/javascript" defer src="assets/agent/agent_settings_rag.js"></script>
<script type="text/javascript" defer src="assets/agent/agent_settings_runner.js"></script>
<script type="text/javascript" defer src="assets/agent/agent_settings_tts.js"></script>
<script type="text/javascript" defer src="assets/filer/filer.js"></script>
<script type="text/javascript" defer src="assets/agent/main.js"></script>
</body>
</html>
